name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: horatio.vudse26.cloud
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./VUNA-Calc-striped/
          server-dir: /public_html/
          exclude: |
            .git/**
            .gitignore
            .github/**
            node_modules/**
            package.json
            package-lock.json
            eslint.config.mjs
            jest.config.js
            Dockerfile
